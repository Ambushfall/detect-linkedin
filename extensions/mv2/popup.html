<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension Detector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f1923;
      color: #e0e6ed;
      min-width: 420px;
      max-width: 500px;
    }

    .header {
      background: linear-gradient(135deg, #1a2a3a 0%, #0d1b2a 100%);
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.15);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.2px;
    }

    .header .badge {
      margin-left: auto;
      background: rgba(0, 212, 255, 0.12);
      color: #00d4ff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 10px;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }

    .content {
      padding: 16px 20px;
      max-height: 400px;
      overflow-y: auto;
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
    }

    .empty-state .icon {
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state h2 {
      font-size: 14px;
      font-weight: 600;
      color: #8899aa;
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 12px;
      color: #556677;
      line-height: 1.5;
    }

    .result-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }

    .result-card:hover {
      border-color: rgba(0, 212, 255, 0.2);
    }

    .result-card:last-child {
      margin-bottom: 0;
    }

    .result-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .result-row:last-child {
      margin-bottom: 0;
    }

    .result-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #556677;
      min-width: 70px;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .result-value {
      font-size: 12px;
      color: #c0ccdd;
      word-break: break-all;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    .result-value.id {
      color: #ff6b6b;
    }

    .result-value.file {
      color: #ffd93d;
    }

    .result-value.source {
      color: #69b4ff;
      font-size: 11px;
    }

    .footer {
      padding: 10px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .footer span {
      font-size: 10px;
      color: #445566;
    }

    .footer .approach {
      color: #00d4ff;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🔍</div>
    <h1>Extension Detector</h1>
    <span class="badge" id="count-badge">—</span>
  </div>

  <div class="content" id="results-container">
    <div class="empty-state" id="empty-state">
      <div class="icon">🛡️</div>
      <h2>No fingerprinting detected</h2>
      <p>Navigate to a page and this extension will<br>scan loaded scripts for fingerprinting patterns.</p>
    </div>
  </div>

  <div class="footer">
    <span>Manifest V2 · <span class="approach">Content Script + Fetch</span></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
